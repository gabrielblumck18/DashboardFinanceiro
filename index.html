<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças | Controle Financeiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <header class="bg-primary text-white py-4 mb-4">
        <div class="container">
            <h1 class="h2 mb-0">Dashboard de Controle Financeiro</h1>
        </div>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary mt-3">
            <div class="container">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" href="#resumo">Resumo</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#transacoes">Transações</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#investimentos">Investimentos</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <section id="resumo" class="mb-5">
            <h2 class="mb-4 text-dark">Resumo do Mês</h2>
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title text-muted mb-2">Saldo Atual</h5>
                            <p class="card-text h3 text-primary"><strong>R$ 0,00</strong></p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title text-muted mb-2">Receitas</h5>
                            <p class="card-text h3 text-success"><span>R$ 0,00</span></p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title text-muted mb-2">Despesas</h5>
                            <p class="card-text h3 text-danger"><span>R$ 0,00</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="cadastro" class="mb-5">
            <h2 class="mb-4 text-dark">Nova Transação</h2>
            <div class="card shadow-sm">
                <div class="card-body">
                    <form class="row g-3">
                        <div class="col-md-6">
                            <label for="descricao" class="form-label">Descrição:</label>
                            <input type="text" class="form-control" id="descricao" placeholder="Ex: Aluguel">
                        </div>
                        <div class="col-md-6">
                            <label for="valor" class="form-label">Valor:</label>
                            <input type="number" class="form-control" id="valor" step="0.01">
                        </div>
                        <div class="col-md-6">
                            <label for="categoria" class="form-label">Categoria:</label>
                            <select class="form-select" id="categoria">
                                <option value="lazer">Lazer</option>
                                <option value="alimentacao">Alimentação</option>
                                <option value="saude">Saúde</option>
                                <option value="transporte">Transporte</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary mt-2">Adicionar</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <section id="transacoes" class="mb-5">
            <h2 class="mb-4 text-dark">Histórico</h2>
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Data</th>
                                <th>Descrição</th>
                                <th>Categoria</th>
                                <th>Valor</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>01/10/2023</td>
                                <td>Salário</td>
                                <td>Receita</td>
                                <td>R$ 5.000,00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 Sistema de Finanças Pessoais</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
